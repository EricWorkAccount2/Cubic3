<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./src/style.css"/>
    <title>cubicrubic</title>
  </head>
  <body>
      <h1>Cubic Equation Solver</h1>

    <div class="content">
      <form id="quad-form">
          <label for="a">A Value:   <input type="number" id="a" name="a" required /></label>
          <label for="b">B value:   <input type="number" id="b" name="b" required /></label>
          <label for="c">C value:   <input type="number" id="c" name="c" required /></label>
          <label for="d">D value:   <input type="number" id="d" name="d" required /></label>
          <button id="solve-btn">Solve</button>
      </form>

      <div class="graph-container">
        <h2>Graph</h2>
        <canvas id="graph" width="500" height="500"></canvas>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
