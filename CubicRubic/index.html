<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./src/style.css"/>
    <title>cubicrubic</title>
  </head>
  <body>
    <h1>Cubic Equation Solver</h1>
        <form id="quad-form">
            <label for="a">A Value:<input type="number" id="a" name="a" required /></label>
            <label for="b">B value:<input type="number" id="b" name="b" required /></label>
            <label for="c">C value:<input type="number" id="c" name="c" required /></label>
            <label for="d">D value:<input type="number" id="d" name="d" required /></label>
            <label for="result">Result:<input type="text" id="result" name="result" /></label>
            <input type="submit" value="Calculate" />
        </form>

    <!-- where we show the roots -->
    <div id="results"></div>

    <!-- simple canvas for the curve -->
    <canvas id="graph" width="600" height="400"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
